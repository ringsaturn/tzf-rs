name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  deployments: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Collect Workflow Telemetry
        uses: runforesight/workflow-telemetry-action@v2
        with:
          comment_on_pr: false

      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - run: make ci

      - name: Publish benchmark report to job summary
        if: always()
        run: |
          if [ -f benchmark_report.md ]; then
            cat benchmark_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "benchmark_report.md not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark_report
          path: |
            benchmark_report.md
            benchmark_result.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: "criterion_result"
          path: ./target/criterion
